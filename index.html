<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./service-worker.js")
      .then(function(reg){
        console.log("Service Worker aktif", reg);
      })
      .catch(function(err){
        console.log("SW gagal:", err);
      });
  });
}
</script>

</body>
