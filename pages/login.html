<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - E-BOK Sampanahan</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}
.wrap{
  max-width:380px;
  margin:70px auto;
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.12);
}
.logo{
  text-align:center;
  font-size:55px;
}
h1{
  text-align:center;
  color:#1b5e20;
  margin:10px 0 0;
}
p{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:15px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
button:hover{
  background:#1b5e20;
}
.msg{
  margin-top:15px;
  text-align:center;
  color:red;
}
.footer{
  text-align:center;
  margin-top:18px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<div class="wrap">

<div class="logo">🏥</div>

<h1>E-BOK Sampanahan</h1>
<p>UPTD Puskesmas Sampanahan</p>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="msg" id="msg"></div>

<div class="footer">
Versi Final Google Sheet
</div>

</div>

<script>

// GANTI URL INI
const API = "https://script.google.com/macros/s/AKfycbwAbg20ybO32y0y6xoOfvdJAeVipwkM7sT82XUkM9afVCWSlkU4JlhsNaLES8GExMrw/exec";

function login(){

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(user=="" || pass==""){
    msg.innerHTML="Lengkapi username & password";
    return;
  }

  fetch(API + "?mode=login",{
    method:"POST",
    body:JSON.stringify({
      username:user,
      password:pass
    })
  })
  .then(r=>r.json())
  .then(res=>{

    if(res.status=="success"){

      localStorage.setItem("token",res.token);
      localStorage.setItem("role",res.role);
      localStorage.setItem("nama",res.nama);

      location.href="dashboard.html";

    }else{
      msg.innerHTML="Login gagal";
    }

  })
  .catch(err=>{
    msg.innerHTML="Koneksi gagal";
  });

}

</script>

</body>
</html>
