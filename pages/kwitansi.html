<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kwitansi Premium - E-BOK</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#eef7f0,#dff0e3);
padding:18px;
color:#222;
}
.wrap{
max-width:760px;
margin:auto;
background:#fff;
padding:28px;
border-radius:20px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
}
h1{color:#1b5e20;font-size:28px;margin-bottom:8px}
.sub{color:#666;font-size:14px;margin-bottom:22px}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}
.group{margin-bottom:14px}
.group label{
display:block;
font-size:13px;
margin-bottom:6px;
color:#444;
}
.group input,.group textarea{
width:100%;
padding:12px;
border:1px solid #cfd8dc;
border-radius:12px;
font-size:15px;
}
textarea{min-height:90px;resize:vertical}
.full{grid-column:1/-1}
.box-terbilang{
background:#f1f8f2;
padding:12px;
border-radius:12px;
color:#1b5e20;
font-weight:bold;
line-height:1.5;
}
.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:18px;
}
button{
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}
.green{background:#2e7d32;color:#fff}
.blue{background:#1565c0;color:#fff}
.gray{background:#eceff1;color:#222}
.info{
margin-top:16px;
font-size:13px;
color:#666;
}
@media(max-width:700px){
.grid{grid-template-columns:1fr}
}
@media print{
.actions,.info{display:none}
body{background:#fff;padding:0}
.wrap{box-shadow:none;border-radius:0}
}
</style>
</head>

<body>

<div class="wrap">
<h1>🧾 Kwitansi Pembayaran</h1>
<div class="sub">Form premium bukti pembayaran resmi</div>

<div class="grid">

<div class="group">
<label>Nomor Kwitansi</label>
<input id="nomor" readonly>
</div>

<div class="group">
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div class="group full">
<label>Sudah Terima Dari</label>
<input id="dari" placeholder="Nama pemberi">
</div>

<div class="group full">
<label>Uang Sejumlah (Rp)</label>
<input id="nominal" type="number" value="0" oninput="ubahTerbilang()">
</div>

<div class="group full">
<label>Untuk Pembayaran</label>
<textarea id="tujuan" placeholder="Keperluan pembayaran"></textarea>
</div>

<div class="group full">
<label>Terbilang</label>
<div class="box-terbilang" id="terbilang">Nol Rupiah</div>
</div>

</div>

<div class="actions">
<button class="green" onclick="simpan()">💾 Simpan</button>
<button class="blue" onclick="window.print()">🖨️ Print</button>
<button class="gray" onclick="location.href='dashboard.html'">⬅ Dashboard</button>
</div>

<div class="info" id="info">Siap digunakan.</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwAbg20ybO32y0y6xoOfvdJAeVipwkM7sT82XUkM9afVCWSlkU4JlhsNaLES8GExMrw/exec";

if(!localStorage.getItem("token")){
location.href="login.html";
}

loadNomor();
document.getElementById("tanggal").value =
new Date().toISOString().slice(0,10);

function loadNomor(){
fetch(API+"?mode=nomorKWT")
.then(r=>r.json())
.then(res=>{
if(res.status=="success"){
document.getElementById("nomor").value=res.nomor;
}
});
}

function penyebut(n){
const huruf=["","Satu","Dua","Tiga","Empat","Lima","Enam","Tujuh","Delapan","Sembilan","Sepuluh","Sebelas"];
n=parseInt(n);
if(n<12) return huruf[n];
if(n<20) return penyebut(n-10)+" Belas";
if(n<100) return penyebut(n/10)+" Puluh "+penyebut(n%10);
if(n<200) return "Seratus "+penyebut(n-100);
if(n<1000) return penyebut(n/100)+" Ratus "+penyebut(n%100);
if(n<2000) return "Seribu "+penyebut(n-1000);
if(n<1000000) return penyebut(n/1000)+" Ribu "+penyebut(n%1000);
if(n<1000000000) return penyebut(n/1000000)+" Juta "+penyebut(n%1000000);
return n;
}

function ubahTerbilang(){
let n=document.getElementById("nominal").value || 0;
document.getElementById("terbilang").innerText =
penyebut(n)+" Rupiah";
}

function simpan(){

let data={
mode:"saveSurat",
tanggal:document.getElementById("tanggal").value,
jenis:"KUITANSI",
nomor:document.getElementById("nomor").value,
nama:document.getElementById("dari").value,
tujuan:document.getElementById("tujuan").value,
nominal:document.getElementById("nominal").value
};

if(data.nama=="" || data.nominal=="0"){
alert("Lengkapi data");
return;
}

document.getElementById("info").innerText="Menyimpan data...";

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success"){
document.getElementById("info").innerText="✅ Kwitansi tersimpan";
loadNomor();
}else{
document.getElementById("info").innerText="❌ Gagal menyimpan";
}

})
.catch(()=>{
document.getElementById("info").innerText="❌ Koneksi gagal";
});

}
</script>

</body>
</html>
