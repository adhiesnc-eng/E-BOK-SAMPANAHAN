<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rekap Premium - E-BOK</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#eef7f0,#dff0e3);
padding:18px;
color:#222;
}
.wrap{
max-width:1100px;
margin:auto;
}
h1{
font-size:30px;
color:#1b5e20;
margin-bottom:8px;
}
.sub{
color:#666;
margin-bottom:22px;
font-size:14px;
}
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:14px;
margin-bottom:18px;
}
.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}
.card small{
color:#666;
display:block;
margin-bottom:8px;
}
.card b{
font-size:30px;
color:#1b5e20;
}
.panel{
background:#fff;
padding:22px;
border-radius:18px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
margin-bottom:18px;
}
.table{
overflow:auto;
}
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}
th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}
th{
background:#f1f8f2;
color:#1b5e20;
}
.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:18px;
}
button{
padding:11px 15px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}
.green{background:#2e7d32;color:#fff}
.gray{background:#eceff1}
@media(max-width:700px){
h1{font-size:24px}
}
</style>
</head>

<body>

<div class="wrap">

<h1>📊 Rekap Premium</h1>
<div class="sub">Laporan lengkap administrasi & keuangan</div>

<div class="actions">
<button class="green" onclick="location.href='dashboard.html'">⬅ Dashboard</button>
<button class="gray" onclick="window.print()">🖨️ Print</button>
</div>

<div class="stats">
<div class="card"><small>Total Data</small><b id="jml">0</b></div>
<div class="card"><small>Total Pengeluaran</small><b id="uang">Rp0</b></div>
<div class="card"><small>SPT</small><b id="spt">0</b></div>
<div class="card"><small>DPR</small><b id="dpr">0</b></div>
</div>

<div class="panel">
<canvas id="grafik" height="100"></canvas>
</div>

<div class="panel table">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Nomor</th>
<th>Nama</th>
<th>Tujuan</th>
<th>Nominal</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwAbg20ybO32y0y6xoOfvdJAeVipwkM7sT82XUkM9afVCWSlkU4JlhsNaLES8GExMrw/exec";

if(!localStorage.getItem("token")){
location.href="login.html";
}

loadData();

function loadData(){

fetch(API+"?mode=surat")
.then(r=>r.json())
.then(res=>{

if(res.status!="success") return;

let data=res.data;
let html="";

let total=0;
let spt=0;
let dpr=0;
let kwt=0;

for(let i=1;i<data.length;i++){

let row=data[i];

let tgl=row[1];
let jenis=row[2];
let nomor=row[3];
let nama=row[4];
let tujuan=row[5];
let nominal=parseInt(row[6]||0);

total += nominal;

if(jenis=="SPT") spt++;
if(jenis=="DPR") dpr++;
if(jenis=="KUITANSI") kwt++;

html += `
<tr>
<td>${tgl}</td>
<td>${jenis}</td>
<td>${nomor}</td>
<td>${nama}</td>
<td>${tujuan}</td>
<td>Rp ${nominal.toLocaleString("id-ID")}</td>
</tr>
`;
}

document.getElementById("tbody").innerHTML=html;
document.getElementById("jml").innerText=data.length-1;
document.getElementById("uang").innerText=
"Rp"+total.toLocaleString("id-ID");
document.getElementById("spt").innerText=spt;
document.getElementById("dpr").innerText=dpr;

grafik(spt,dpr,kwt);

});
}

function grafik(spt,dpr,kwt){

new Chart(document.getElementById("grafik"),{
type:"bar",
data:{
labels:["SPT","DPR","Kwitansi"],
datasets:[{
label:"Jumlah Dokumen",
data:[spt,dpr,kwt],
borderWidth:1
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

}
</script>

</body>
</html>
